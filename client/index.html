<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PokeMini</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <header id="topbar" class="hidden">
    <div class="topbar-left">
      <span id="player-name"></span>
      <span id="player-rank" class="rank"></span>
    </div>
    <div class="topbar-center" id="step-dots"></div>
    <div class="topbar-right">
      <div class="badges-row" id="badges-display"></div>
      <div class="strikes-row" id="strikes-display"></div>
      <div class="money-display" id="money"></div>
    </div>
  </header>

  <main id="phase-host"></main>

  <footer id="bottombar" class="hidden">
    <div id="team-display" class="team-grid"></div>
    <div id="item-slots" class="items"></div>
  </footer>

  <!-- Server status pill — top-left, visible everywhere. Polls /api/stats every
       30s. Green dot = server reachable + live player count; red dot = offline
       fallback (the game still works locally, just no online matchmaking). -->
  <div id="server-status" class="server-status status-unknown" title="Server status">
    <span class="status-dot"></span>
    <span class="status-text">…</span>
  </div>

  <button id="options-btn" class="hidden" aria-label="Options" title="Options">⋮</button>
  <button id="dex-btn" class="hidden" aria-label="Pokédex" title="Pokédex">📖</button>
  <div id="options-menu" class="hidden">
    <div class="menu-section">
      <div class="menu-section-label" id="opt-lang-label">Language</div>
      <div class="lang-picker">
        <button class="lang-flag" data-lang="en" aria-label="English" title="English">
          <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f1fa-1f1f8.png" alt="US" loading="lazy">
        </button>
        <button class="lang-flag" data-lang="pt-BR" aria-label="Português" title="Português (Brasil)">
          <img src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f1e7-1f1f7.png" alt="BR" loading="lazy">
        </button>
      </div>
    </div>
    <button class="menu-item danger" id="opt-abandon">Abandon Run</button>
  </div>

  <!-- Pokédex overlay — populated and shown by phases.js when #dex-btn is clicked. -->
  <div id="dex-panel" class="hidden">
    <div class="dex-shell">
      <div class="dex-header">
        <div class="dex-title">Pokédex</div>
        <div class="dex-meta"></div>
        <button class="dex-close" id="dex-close" aria-label="Close">×</button>
      </div>
      <div class="dex-grid"></div>
      <div class="dex-detail">
        <div class="dex-detail-empty">Hover or click a Pokémon to see its info.</div>
      </div>
    </div>
  </div>

  <div id="tooltip" class="tooltip hidden"></div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
